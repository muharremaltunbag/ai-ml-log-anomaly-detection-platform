<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Assistant - Test Suite</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #0047BA;
            border-bottom: 2px solid #0047BA;
            padding-bottom: 10px;
        }
        
        .test-controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            background: #0047BA;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #003380;
        }
        
        .test-results {
            background: #2a2a2a;
            border-radius: 5px;
            padding: 20px;
            margin-top: 20px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .test-module {
            margin: 15px 0;
            padding: 15px;
            background: #333;
            border-radius: 5px;
            border-left: 4px solid #0047BA;
        }
        
        .test-module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .module-name {
            font-weight: bold;
            font-size: 16px;
            color: #4CAF50;
        }
        
        .module-status {
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-pending { background: #666; }
        .status-running { background: #FF9800; }
        .status-passed { background: #4CAF50; }
        .status-failed { background: #F44336; }
        
        .test-item {
            margin: 5px 0 5px 20px;
            padding: 5px;
            font-size: 14px;
        }
        
        .test-pass {
            color: #4CAF50;
        }
        
        .test-fail {
            color: #F44336;
        }
        
        .test-summary {
            margin-top: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 5px;
            text-align: center;
        }
        
        .summary-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
        }
        
        #console-output {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .console-log { color: #888; }
        .console-error { color: #F44336; }
        .console-warn { color: #FF9800; }
        .console-info { color: #2196F3; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 MongoDB Assistant - Test Suite</h1>
        
        <!-- test.html içine yeni test butonları ekleyin -->
        <div class="test-controls">
            <button onclick="runAllTests()">🚀 Tüm Testleri Çalıştır</button>
            <button onclick="runModuleTests('core')">📦 Core Tests</button>
            <button onclick="runModuleTests('ui')">🎨 UI Tests</button>
            <button onclick="runModuleTests('history')">📚 History Tests</button>
            <button onclick="runModuleTests('anomaly')">🔍 Anomaly Tests</button>
            <button onclick="runModuleTests('performance')">⚡ Performance Tests</button>
            <button onclick="runModuleTests('ml')">🤖 ML Viz Tests</button>
            <button onclick="runModuleTests('integration')">🔗 Integration Tests</button>
            
            <!-- YENİ TEST BUTONLARI -->
            <button onclick="runModuleTests('script-integration')">🔄 Script Integration</button>
            <button onclick="runModuleTests('ui-interaction')">🖱️ UI Interaction</button>
            <button onclick="runModuleTests('workflows')">⚙️ Advanced Workflows</button>
            
            <button onclick="clearResults()">🗑️ Temizle</button>
        </div>
        
        <div class="test-summary" id="test-summary">
            <h3>Test Özeti</h3>
            <div class="summary-stats">
                <div class="stat-item">
                    <span class="stat-value" id="total-tests">0</span>
                    <span class="stat-label">Toplam Test</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="passed-tests" style="color: #4CAF50;">0</span>
                    <span class="stat-label">Başarılı</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="failed-tests" style="color: #F44336;">0</span>
                    <span class="stat-label">Başarısız</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="test-time">0ms</span>
                    <span class="stat-label">Süre</span>
                </div>
            </div>
        </div>
        
        <div class="test-results" id="test-results">
            <p style="text-align: center; color: #666;">Test sonuçları burada görünecek...</p>
        </div>
        
        <div id="console-output">
            <h4 style="margin-top: 0;">📝 Console Output</h4>
            <div id="console-logs"></div>
        </div>
    </div>
    
    <!-- Ana modülleri yükle -->
    <script src="../script-core.js"></script>
    <script src="../script-ui.js"></script>
    <script src="../script-history.js"></script>
    <script src="../script-anomaly.js"></script>
    <script src="../script-performance.js"></script>
    <script src="../script-ml-visualization.js"></script>
    
    <!-- Test modüllerini yükle -->
    <script src="test-suite.js"></script>
    <script src="test-core.js"></script>
    <script src="test-ui.js"></script>
    <script src="test-history.js"></script>
    <script src="test-anomaly.js"></script>
    <script src="test-performance.js"></script>
    <script src="test-ml-visualization.js"></script>
    <script src="test-integration.js"></script>
    <!-- Script yüklemeleri sonuna ekleyin -->
    <script src="test-script-integration.js"></script>
    <script src="test-ui-interaction.js"></script>
    <script src="test-advanced-workflows.js"></script>
</body>
</html>
